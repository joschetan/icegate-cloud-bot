name: CK ICEGATE Cloud Auto-Bot

on:
  schedule:
    - cron: '0 20 * * *' # रोज़ रात को ऑटोमैटिक चलेगा
  workflow_dispatch: # मैनुअल बटन देगा

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # आधुनिक पायथन वर्जन

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        playwright install chromium

    - name: Execute ICEGATE Auto-Script
      env:
        GOOGLE_JSON_SECRET: ${{ secrets.GOOGLE_JSON_SECRET }}
        GOOGLE_SHEET_LINK: ${{ secrets.GOOGLE_SHEET_LINK }}
      run: python script.py
