name: CK ICEGATE Cloud Auto-Bot

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    # ⚡ बदलाव: ऐक्शन्स को नए वर्जन्स पर सेट कर दिया ताकि Node.js की वार्निंग गायब हो जाए
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Execute ICEGATE Auto-Script
      env:
        GOOGLE_JSON_SECRET: ${{ secrets.GOOGLE_JSON_SECRET }}
        GOOGLE_SHEET_LINK: ${{ secrets.GOOGLE_SHEET_LINK }}
      run: python script.py
