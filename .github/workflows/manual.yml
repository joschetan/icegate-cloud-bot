name: Icegate Welspun DSR Automation

on:
  workflow_dispatch: # मैनुअल रन करने के लिए बटन देगा

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        # Node 24 कम्पैटिबिलिटी पक्की करने के लिए
        persist-credentials: false

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Required Libraries
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Automation Script
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        # continue-on-error को हैंडल करने के लिए पायथन को सेफ़ मोड में चलाना
        python script.py
